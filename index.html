<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>사내 헌혈 행사 예약</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-dark: #A32D2D;
    --red-border: #F7C1C1;
    --green: #639922;
    --green-light: #EAF3DE;
    --green-dark: #3B6D11;
    --gray: #888780;
    --gray-light: #F1EFE8;
    --gray-dark: #444441;
    --text: #2C2C2A;
    --text-muted: #5F5E5A;
    --border: rgba(44,44,42,0.12);
    --bg: #fff;
    --surface: #F8F7F4;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --text: #F1EFE8;
      --text-muted: #B4B2A9;
      --border: rgba(241,239,232,0.12);
      --bg: #1C1C1A;
      --surface: #2C2C2A;
      --red-light: #501313;
      --green-light: #173404;
      --gray-light: #2C2C2A;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    background: var(--red);
    color: #fff;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }

  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    margin-left: 38px;
  }

  .name-section {
    background: var(--bg);
    margin: 12px;
    border-radius: var(--radius);
    padding: 16px;
    border: 0.5px solid var(--border);
  }

  .name-section label {
    font-size: 13px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .name-row {
    display: flex;
    gap: 8px;
  }

  .name-input {
    flex: 1;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .name-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(226,75,74,0.1);
  }

  .name-confirm-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .name-confirm-btn:active { opacity: 0.85; }

  .name-confirmed {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .name-badge {
    background: var(--red-light);
    color: var(--red-dark);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 500;
    border: 0.5px solid var(--red-border);
  }

  .name-change-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
  }

  .my-booking-banner {
    background: var(--green-light);
    margin: 0 12px 4px;
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 0.5px solid rgba(99,153,34,0.2);
  }

  .my-booking-banner .dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .my-booking-text {
    font-size: 13px;
    color: var(--green-dark);
    flex: 1;
  }

  .my-booking-text strong { font-weight: 600; }

  .cancel-my-btn {
    background: none;
    border: 0.5px solid rgba(99,153,34,0.3);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--green-dark);
    cursor: pointer;
  }

  .section-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 12px 16px 6px;
  }

  .slot-card {
    background: var(--bg);
    margin: 0 12px 8px;
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .slot-card.mine {
    border-color: var(--green);
    border-width: 1.5px;
  }

  .slot-card.full {
    opacity: 0.65;
  }

  .time-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    min-width: 56px;
  }

  .slot-mid {
    flex: 1;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--red);
    transition: width 0.3s;
  }

  .progress-fill.full { background: var(--gray); }
  .progress-fill.mine { background: var(--green); }

  .count-text {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .spot-dots {
    display: flex;
    gap: 4px;
  }

  .spot-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    transition: all 0.2s;
  }

  .spot-dot.taken { background: var(--red); border-color: var(--red); }
  .spot-dot.taken.mine { background: var(--green); border-color: var(--green); }

  .book-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }

  .book-btn:active { opacity: 0.85; transform: scale(0.97); }

  .book-btn:disabled {
    background: var(--gray-light);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .book-btn.mine-btn {
    background: var(--green);
  }

  .book-btn.cancel-btn {
    background: none;
    color: var(--green-dark);
    border: 1px solid var(--green);
    font-size: 12px;
    padding: 8px 10px;
  }

  .status-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .status-tag.full-tag {
    background: var(--gray-light);
    color: var(--gray-dark);
  }

  .status-tag.mine-tag {
    background: var(--green-light);
    color: var(--green-dark);
  }

  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .info-banner {
    margin: 4px 12px 8px;
    padding: 10px 14px;
    background: var(--gray-light);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-btn {
    margin: 0 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    width: calc(100% - 24px);
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-icon">🩸</div>
    <h1>사내 헌혈 행사 예약</h1>
  </div>
  <div class="header-sub">09:30 – 12:00 &nbsp;·&nbsp; 시간대별 최대 5명</div>
</div>

<div id="app">
  <div class="loading">예약 현황 불러오는 중...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const TIME_SLOTS = [
  '09:30', '10:00', '10:30', '11:00', '11:30'
];
const MAX_PER_SLOT = 5;
const STORAGE_KEY = 'blood_donation_bookings_v1';
const NAME_KEY = 'blood_donation_user_name';

let userName = '';
let bookings = {};
let mySlot = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function loadBookings() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      bookings = JSON.parse(result.value);
    } else {
      bookings = {};
      TIME_SLOTS.forEach(s => bookings[s] = []);
    }
  } catch {
    bookings = {};
    TIME_SLOTS.forEach(s => bookings[s] = []);
  }
  findMySlot();
}

async function saveBookings() {
  await window.storage.set(STORAGE_KEY, JSON.stringify(bookings), true);
}

function findMySlot() {
  mySlot = null;
  if (!userName) return;
  for (const slot of TIME_SLOTS) {
    if ((bookings[slot] || []).includes(userName)) {
      mySlot = slot;
      break;
    }
  }
}

async function bookSlot(slot) {
  if (!userName) { showToast('이름을 먼저 입력해주세요'); return; }
  await loadBookings();
  if (mySlot) { showToast('이미 예약하셨습니다'); render(); return; }
  if (!bookings[slot]) bookings[slot] = [];
  if (bookings[slot].length >= MAX_PER_SLOT) { showToast('해당 시간대가 마감되었습니다'); render(); return; }
  if (bookings[slot].includes(userName)) { showToast('이미 예약하셨습니다'); return; }
  bookings[slot].push(userName);
  await saveBookings();
  findMySlot();
  showToast(`✅ ${slot} 예약 완료!`);
  render();
}

async function cancelSlot() {
  if (!mySlot || !userName) return;
  await loadBookings();
  bookings[mySlot] = (bookings[mySlot] || []).filter(n => n !== userName);
  await saveBookings();
  findMySlot();
  showToast('예약이 취소되었습니다');
  render();
}

function setName(name) {
  userName = name.trim();
  if (userName) {
    try { localStorage.setItem(NAME_KEY, userName); } catch {}
  }
  findMySlot();
  render();
}

function render() {
  const app = document.getElementById('app');

  let html = '';

  html += `<div class="name-section">`;
  html += `<label>예약자 이름</label>`;
  if (userName) {
    html += `<div class="name-confirmed">
      <span class="name-badge">👤 ${userName}</span>
      <button class="name-change-btn" onclick="changeName()">변경</button>
    </div>`;
  } else {
    html += `<div class="name-row">
      <input class="name-input" id="nameInput" type="text" placeholder="이름을 입력하세요" maxlength="20" onkeydown="if(event.key==='Enter')confirmName()" />
      <button class="name-confirm-btn" onclick="confirmName()">확인</button>
    </div>`;
  }
  html += `</div>`;

  if (mySlot) {
    html += `<div class="my-booking-banner">
      <div class="dot"></div>
      <div class="my-booking-text">
        <strong>${mySlot}</strong> 예약 완료 · 헌혈 장소에서 이름 말씀해주세요
      </div>
      <button class="cancel-my-btn" onclick="cancelSlot()">취소</button>
    </div>`;
  }

  html += `<div class="info-banner">선착순 마감 · 예약 후 변경 시 재예약 가능</div>`;
  html += `<div class="section-title">시간대 선택</div>`;

  TIME_SLOTS.forEach(slot => {
    const list = bookings[slot] || [];
    const count = list.length;
    const isFull = count >= MAX_PER_SLOT;
    const isMine = list.includes(userName);
    const pct = (count / MAX_PER_SLOT) * 100;

    let cardClass = 'slot-card';
    if (isMine) cardClass += ' mine';
    else if (isFull) cardClass += ' full';

    let fillClass = 'progress-fill';
    if (isMine) fillClass += ' mine';
    else if (isFull) fillClass += ' full';

    let dots = '';
    for (let i = 0; i < MAX_PER_SLOT; i++) {
      let dotClass = 'spot-dot';
      if (i < count) {
        dotClass += ' taken';
        if (isMine && i === list.indexOf(userName)) dotClass += ' mine';
      }
      dots += `<div class="${dotClass}"></div>`;
    }

    let btnHtml = '';
    if (isMine) {
      btnHtml = `<span class="status-tag mine-tag">내 예약</span>`;
    } else if (isFull) {
      btnHtml = `<span class="status-tag full-tag">마감</span>`;
    } else {
      const disabled = mySlot ? 'disabled' : '';
      btnHtml = `<button class="book-btn" ${disabled} onclick="bookSlot('${slot}')">예약</button>`;
    }

    html += `<div class="${cardClass}">
      <div class="time-label">${slot}</div>
      <div class="slot-mid">
        <div class="progress-row">
          <div class="progress-bar"><div class="${fillClass}" style="width:${pct}%"></div></div>
          <span class="count-text">${count}/${MAX_PER_SLOT}</span>
        </div>
        <div class="spot-dots">${dots}</div>
      </div>
      ${btnHtml}
    </div>`;
  });

  html += `<button class="refresh-btn" onclick="refreshData()">↻ &nbsp;현황 새로고침</button>`;

  app.innerHTML = html;

  if (!userName) {
    const inp = document.getElementById('nameInput');
    if (inp) setTimeout(() => inp.focus(), 100);
  }
}

function confirmName() {
  const inp = document.getElementById('nameInput');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) { showToast('이름을 입력해주세요'); return; }
  setName(val);
}

function changeName() {
  userName = '';
  try { localStorage.removeItem(NAME_KEY); } catch {}
  render();
}

async function refreshData() {
  await loadBookings();
  render();
  showToast('현황을 업데이트했습니다');
}

async function init() {
  try {
    const saved = localStorage.getItem(NAME_KEY);
    if (saved) userName = saved;
  } catch {}
  await loadBookings();
  render();
  setInterval(async () => {
    await loadBookings();
    render();
  }, 15000);
}

init();
</script>
</body>
</html>
