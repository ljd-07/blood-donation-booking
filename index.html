<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>사내 헌혈 행사 예약</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-dark: #A32D2D;
    --red-border: #F7C1C1;
    --green: #639922;
    --green-light: #EAF3DE;
    --green-dark: #3B6D11;
    --gray: #888780;
    --gray-light: #F1EFE8;
    --gray-dark: #444441;
    --orange: #E67E22;
    --orange-light: #FDF2E9;
    --orange-dark: #A04000;
    --text: #2C2C2A;
    --text-muted: #5F5E5A;
    --border: rgba(44,44,42,0.12);
    --bg: #fff;
    --surface: #F8F7F4;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --text: #F1EFE8;
      --text-muted: #B4B2A9;
      --border: rgba(241,239,232,0.12);
      --bg: #1C1C1A;
      --surface: #2C2C2A;
      --red-light: #501313;
      --green-light: #173404;
      --gray-light: #2C2C2A;
      --orange-light: #5E2F0D;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .header {
    background: var(--red);
    color: #fff;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.8); margin-left: 38px; }

  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #4ade80;
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .name-section {
    background: var(--bg);
    margin: 12px;
    border-radius: var(--radius);
    padding: 16px;
    border: 0.5px solid var(--border);
  }

  .name-section label {
    font-size: 13px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .name-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .name-input {
    flex: 2;
    min-width: 130px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .pw-input {
    flex: 1;
    min-width: 90px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .name-input:focus, .pw-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(226,75,74,0.1);
  }

  .name-confirm-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }

  .name-confirmed { display: flex; align-items: center; gap: 8px; }

  .name-badge {
    background: var(--red-light);
    color: var(--red-dark);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 500;
    border: 0.5px solid var(--red-border);
  }

  .name-change-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
  }

  .my-booking-banner {
    margin: 0 12px 4px;
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .my-booking-banner.confirmed {
    background: var(--green-light);
    border: 0.5px solid rgba(99,153,34,0.25);
  }
  .my-booking-banner.waiting {
    background: var(--orange-light);
    border: 0.5px solid rgba(230,126,34,0.25);
  }

  .my-booking-banner .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .my-booking-banner.confirmed .dot { background: var(--green); }
  .my-booking-banner.waiting .dot { background: var(--orange); }

  .my-booking-text { font-size: 13px; flex: 1; }
  .my-booking-banner.confirmed .my-booking-text { color: var(--green-dark); }
  .my-booking-banner.waiting .my-booking-text { color: var(--orange-dark); }
  .my-booking-text strong { font-weight: 600; }

  .cancel-my-btn {
    background: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .my-booking-banner.confirmed .cancel-my-btn {
    border: 0.5px solid rgba(99,153,34,0.35);
    color: var(--green-dark);
  }
  .my-booking-banner.waiting .cancel-my-btn {
    border: 0.5px solid rgba(230,126,34,0.35);
    color: var(--orange-dark);
  }

  .section-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    padding: 12px 16px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slot-card {
    background: var(--bg);
    margin: 0 12px 8px;
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .slot-card.mine { border-color: var(--green); border-width: 1.5px; }
  .slot-card.mine-waiting { border-color: var(--orange); border-width: 1.5px; }

  .slot-main-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .time-label { font-size: 16px; font-weight: 600; color: var(--text); min-width: 56px; }

  .slot-mid { flex: 1; }

  .progress-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }

  .progress-bar {
    flex: 1; height: 4px;
    background: var(--border);
    border-radius: 2px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; border-radius: 2px;
    background: var(--red); transition: width 0.4s;
  }

  .progress-fill.full-fill { background: var(--gray); }
  .progress-fill.mine-fill { background: var(--green); }
  .progress-fill.waiting-fill { background: var(--orange); }

  .count-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  .spot-dots { display: flex; gap: 4px; align-items: center; }

  .spot-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    transition: all 0.2s;
  }

  .spot-dot.taken { background: var(--red); border-color: var(--red); }
  .spot-dot.taken.is-mine { background: var(--green); border-color: var(--green); }
  
  .wait-badge {
    font-size: 11px;
    background: var(--orange-light);
    color: var(--orange-dark);
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 500;
  }

  .book-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }
  .book-btn.wait-btn {
    background: var(--orange);
  }

  .book-btn:active { opacity: 0.85; transform: scale(0.97); }

  .book-btn:disabled {
    background: var(--gray-light);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .status-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }

  .tag-full { background: var(--gray-light); color: var(--gray-dark); }
  .tag-mine { background: var(--green-light); color: var(--green-dark); }
  .tag-waiting { background: var(--orange-light); color: var(--orange-dark); }

  /* 명단 토글 영역 */
  .attendee-list-wrapper {
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    border-top: 0.5px solid var(--border);
    display: none;
  }
  .slot-card.expanded .attendee-list-wrapper {
    display: block;
  }
  .attendee-title {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .attendee-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .attendee-name-tag {
    background: var(--bg);
    border: 0.5px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--text);
  }
  .attendee-name-tag.its-me {
    border-color: var(--green);
    color: var(--green-dark);
    font-weight: bold;
  }
  .attendee-name-tag.is-waiting-user {
    border-color: var(--orange);
    color: var(--orange-dark);
  }

  .info-banner {
    margin: 4px 12px 8px;
    padding: 10px 14px;
    background: var(--gray-light);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* 관리자 모드 스타일 */
  .admin-panel {
    background: #2C3E50;
    color: #ECF0F1;
    margin: 12px;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 13px;
  }
  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 8px;
  }
  .admin-title { font-weight: bold; font-size: 14px; color: #3498DB; }
  .admin-summary {
    display: flex;
    gap: 15px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  .admin-btn {
    background: #2980B9;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .admin-btn:hover { background: #3498DB; }

  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    margin: 20px 12px;
    padding: 16px;
    background: var(--red-light);
    border-radius: var(--radius);
    border: 0.5px solid var(--red-border);
    font-size: 13px;
    color: var(--red-dark);
    line-height: 1.6;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-icon">🩸</div>
    <h1>사내 헌혈 행사 예약</h1>
  </div>
  <div class="header-sub" id="liveStatus">09:30 – 12:00 &nbsp;·&nbsp; 시간대별 정원 5명</div>
</div>

<div id="adminPanel" style="display:none;"></div>

<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span>연결 중...</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ★★★ 여기에 본인의 Firebase 설정값을 붙여넣으세요 ★★★
const firebaseConfig = {
  apiKey: "AIzaSyDs_M9j-YtbAtSWpZejWNxrZ8IQZPIAIlA",
  authDomain: "blood-donation-72cd8.firebaseapp.com",
  databaseURL: "https://blood-donation-72cd8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blood-donation-72cd8",
  storageBucket: "blood-donation-72cd8.firebasestorage.app",
  messagingSenderId: "591365845671",
  appId: "1:591365845671:web:4d1b65fd3c34652c472182",
  measurementId: "G-V14JB734JQ"
};

const TIME_SLOTS = ['09:30','10:00','10:30','11:00','11:30'];
const MAX_PER_SLOT = 5;
const NAME_KEY = 'blood_donation_user_v2';
const PASSWORD_KEY = 'blood_donation_pw_v2';
const ADMIN_NAME = '관리자'; 

let userName = '';
let userPw = ''; // 현재 로그인한 사용자의 임시 비밀번호
let bookings = {};
let mySlot = null;
let myStatus = ''; 
let expandedSlots = {}; 
let db;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function findMySlot() {
  mySlot = null;
  myStatus = '';
  if (!userName) return;

  for (const slot of TIME_SLOTS) {
    const slotData = bookings[slot] || {};
    const items = Object.values(slotData);
    const mine = items.find(item => item.name === userName);
    if (mine) {
      mySlot = slot;
      myStatus = mine.type;
      break;
    }
  }
}

function getSortedList(slotData) {
  const items = Object.values(slotData);
  items.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
  
  const confirmed = items.filter(i => i.type === 'confirmed');
  const waiting = items.filter(i => i.type === 'waiting');
  return { confirmed, waiting };
}

function renderAdmin() {
  const adminDiv = document.getElementById('adminPanel');
  if (userName !== ADMIN_NAME) {
    adminDiv.style.display = 'none';
    return;
  }
  adminDiv.style.display = 'block';

  let totalConfirmed = 0;
  let totalWaiting = 0;
  
  TIME_SLOTS.forEach(slot => {
    const { confirmed, waiting } = getSortedList(bookings[slot] || {});
    totalConfirmed += confirmed.length;
    totalWaiting += waiting.length;
  });

  adminDiv.innerHTML = `
    <div class="admin-panel">
      <div class="admin-header">
        <span class="admin-title">🛠️ 총괄 관리자 모드</span>
        <button class="admin-btn" onclick="window._downloadCsv()">명단 다운로드 (CSV)</button>
      </div>
      <div class="admin-summary">
        <div>확정 인원: <strong>${totalConfirmed}</strong>명 / 25명</div>
        <div>대기 인원: <strong>${totalWaiting}</strong>명</div>
      </div>
    </div>
  `;
}

function render() {
  findMySlot();
  renderAdmin();
  
  const app = document.getElementById('app');
  let html = '';

  // 이름 및 암호 입력 영역
  html += `<div class="name-section"><label>예약자 본인인증 (이름 및 암호)</label>`;
  if (userName) {
    html += `<div class="name-confirmed">
      <span class="name-badge">${userName === ADMIN_NAME ? '👑' : '👤'} ${escHtml(userName)} (접속됨)</span>
      <button class="name-change-btn" onclick="changeName()">로그아웃/변경</button>
    </div>`;
  } else {
    html += `<div class="name-row">
      <input class="name-input" id="nameInput" type="text" placeholder="이름 입력" maxlength="20"/>
      <input class="pw-input" id="pwInput" type="password" placeholder="암호 (숫자4자리 권장)" maxlength="15"
        onkeydown="if(event.key==='Enter')window._confirmIdentity()"/>
      <button class="name-confirm-btn" onclick="window._confirmIdentity()">확인</button>
    </div>`;
  }
  html += `</div>`;

  if (mySlot) {
    if (myStatus === 'confirmed') {
      html += `<div class="my-booking-banner confirmed">
        <div class="dot"></div>
        <div class="my-booking-text"><strong>${mySlot}</strong> 확정 완료 · 취소 시 설정한 비밀번호 검증이 필요합니다.</div>
        <button class="cancel-my-btn" onclick="window._cancelSlot()">예약 취소</button>
      </div>`;
    } else {
      html += `<div class="my-booking-banner waiting">
        <div class="dot"></div>
        <div class="my-booking-text"><strong>${mySlot}</strong> 대기 예약 중 · 앞 순번 취소 시 자동 확정됩니다.</div>
        <button class="cancel-my-btn" onclick="window._cancelSlot()">대기 취소</button>
      </div>`;
    }
  }

  html += `<div class="info-banner">
    • 본인 이름과 함께 사용할 <strong>임의의 암호</strong>를 입력하여 예약 시스템에 접속해 주세요.<br>
    • 본인이 설정한 암호를 모르면 타인이 내 예약을 절대 취소할 수 없습니다.
  </div>`;
  html += `<div class="section-title"><span>시간대 선택 (클릭 시 명단 토글)</span></div>`;

  TIME_SLOTS.forEach(slot => {
    const slotData = bookings[slot] || {};
    const { confirmed, waiting } = getSortedList(slotData);
    
    const count = confirmed.length;
    const waitCount = waiting.length;
    const isFull = count >= MAX_PER_SLOT;
    const isMine = mySlot === slot;
    const pct = Math.round((count / MAX_PER_SLOT) * 100);

    let cardClass = 'slot-card';
    if (isMine) {
      cardClass += (myStatus === 'confirmed') ? ' mine' : ' mine-waiting';
    } else if (isFull) {
      cardClass += ' full';
    }
    if (expandedSlots[slot]) cardClass += ' expanded';

    let fillClass = 'progress-fill';
    if (isMine) {
      fillClass += (myStatus === 'confirmed') ? ' mine-fill' : ' waiting-fill';
    } else if (isFull) {
      fillClass += ' full-fill';
    }

    let dots = '';
    for (let i = 0; i < MAX_PER_SLOT; i++) {
      let dc = 'spot-dot';
      if (i < count) { 
        dc += ' taken'; 
        if (isMine && myStatus === 'confirmed' && confirmed[i]?.name === userName) dc += ' is-mine'; 
      }
      dots += `<div class="${dc}"></div>`;
    }
    if (waitCount > 0) {
      dots += `<span class="wait-badge">대기 ${waitCount}명</span>`;
    }

    let btnHtml = '';
    if (isMine) {
      btnHtml = (myStatus === 'confirmed') 
        ? `<span class="status-tag tag-mine">확정 완료</span>` 
        : `<span class="status-tag tag-waiting">대기중</span>`;
    } else if (isFull) {
      const dis = (mySlot && !isMine) ? 'disabled' : '';
      btnHtml = `<button class="book-btn wait-btn" ${dis} onclick="window._bookSlot('${slot}', true); event.stopPropagation();">대기 접수</button>`;
    } else {
      const dis = (mySlot && !isMine) ? 'disabled' : '';
      btnHtml = `<button class="book-btn" ${dis} onclick="window._bookSlot('${slot}', false); event.stopPropagation();">예약</button>`;
    }

    let confirmedTags = confirmed.map(p => `<span class="attendee-name-tag ${p.name===userName?'its-me':''}">${escHtml(p.name)}</span>`).join('');
    let waitingTags = waiting.map((p, idx) => `<span class="attendee-name-tag is-waiting-user ${p.name===userName?'its-me':''}">대기${idx+1}:${escHtml(p.name)}</span>`).join('');

    html += `
    <div class="${cardClass}" onclick="window._toggleSlotExpand('${slot}')">
      <div class="slot-main-row">
        <div class="time-label">${slot}</div>
        <div class="slot-mid">
          <div class="progress-row">
            <div class="progress-bar"><div class="${fillClass}" style="width:${pct}%"></div></div>
            <span class="count-text">${count}/${MAX_PER_SLOT}</span>
          </div>
          <div class="spot-dots">${dots}</div>
        </div>
        ${btnHtml}
      </div>
      <div class="attendee-list-wrapper">
        <div class="attendee-title">⏱️ 확정 명단</div>
        <div class="attendee-tags">${confirmedTags || '<span style="color:var(--text-muted)">등록된 예약자가 없습니다.</span>'}</div>
        ${waiting.length > 0 ? `
          <div class="attendee-title" style="margin-top:8px; color:var(--orange)">⏳ 대기자 명단</div>
          <div class="attendee-tags">${waitingTags}</div>
        ` : ''}
      </div>
    </div>`;
  });

  app.innerHTML = html;

  if (!userName) {
    const inp = document.getElementById('nameInput');
    if (inp) setTimeout(() => inp.focus(), 80);
  }

  document.getElementById('liveStatus').innerHTML =
    `<span class="live-dot"></span> 실시간 연결됨 &nbsp;·&nbsp; 정원 ${MAX_PER_SLOT}명 (초과 시 대기 가능)`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window._toggleSlotExpand = (slot) => {
  expandedSlots[slot] = !expandedSlots[slot];
  render();
};

// 예약 신청 시 이름과 함께 비밀번호도 암호화 기법 없이 키값 내부에 매칭 저장합니다.
window._bookSlot = async (slot, isWaitingMode = false) => {
  if (!userName || !userPw) { showToast('상단에서 이름과 암호를 입력 후 접속해 주세요.'); return; }
  if (mySlot) { showToast('이미 예약(또는 대기) 내역이 있습니다.'); return; }

  const slotRef = ref(db, `bookings/${slot}`);
  try {
    const result = await runTransaction(slotRef, (current) => {
      const data = current || {};
      const items = Object.values(data);
      
      // 누군가 이미 해당 이름을 쓰고 있는지 전체 타임 검증 (실제로는 Realtime DB 상에 중복명 불가 처리)
      if (items.some(i => i.name === userName)) {
        return data; 
      }

      const confirmedCount = items.filter(i => i.type === 'confirmed').length;
      const key = Date.now().toString();

      if (confirmedCount < MAX_PER_SLOT && !isWaitingMode) {
        data[key] = { name: userName, password: userPw, timestamp: Date.now(), type: 'confirmed' };
      } else {
        data[key] = { name: userName, password: userPw, timestamp: Date.now(), type: 'waiting' };
      }
      return data;
    });

    if (result.committed) {
      showToast(`✅ ${slot} 신청 처리가 완료되었습니다.`);
    }
  } catch (e) {
    showToast('오류가 발생했습니다. 다시 시도해주세요');
  }
};

// 취소 로직 실행 시 브라우저 프롬프트창을 이용해 패스워드를 재검증
window._cancelSlot = async () => {
  if (!mySlot || !userName) return;

  // 1차 프롬프트 검증
  const inputPw = prompt("예약 취소를 위해 본인의 암호를 입력해주세요:");
  if (inputPw === null) return; // 취소 버튼 클릭 시 종료
  if (!inputPw.trim()) { showToast('암호를 정확히 입력해야 합니다.'); return; }

  const slotRef = ref(db, `bookings/${mySlot}`);
  try {
    let isPasswordCorrect = true;

    await runTransaction(slotRef, (current) => {
      const data = current || {};
      
      let targetKey = null;
      for (const key of Object.keys(data)) {
        if (data[key].name === userName) { 
          targetKey = key; 
          break; 
        }
      }

      if (targetKey) {
        // 데이터베이스 내부에 저장된 비밀번호와 실시간 입력 비밀번호 검증 (관리자 계정은 패스 통과 가능)
        if (data[targetKey].password !== inputPw.trim() && userName !== ADMIN_NAME) {
          isPasswordCorrect = false;
          return data; // 변경 취소
        }
        delete data[targetKey];
      }

      // 대기 순번 자동 승격 알고리즘
      const items = Object.entries(data).map(([key, val]) => ({ key, ...val }));
      items.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

      let confirmedCount = 0;
      items.forEach(item => {
        if (item.type === 'confirmed') {
          confirmedCount++;
        } else if (item.type === 'waiting') {
          if (confirmedCount < MAX_PER_SLOT) {
            data[item.key].type = 'confirmed';
            confirmedCount++;
          }
        }
      });

      return data;
    });

    if (isPasswordCorrect) {
      showToast('예약이 정상적으로 취소되었습니다.');
    } else {
      alert('❌ 암호가 일치하지 않습니다. 본인 확인에 실패했습니다.');
    }
  } catch (e) {
    showToast('오류가 발생했습니다.');
  }
};

// 이름 및 암호 동시 확인 접속 처리
window._confirmIdentity = () => {
  const nameInp = document.getElementById('nameInput');
  const pwInp = document.getElementById('pwInput');
  if (!nameInp || !pwInp) return;

  const nameVal = nameInp.value.trim();
  const pwVal = pwInp.value.trim();

  if (!nameVal) { showToast('이름을 입력해주세요'); return; }
  if (!pwVal) { showToast('비밀번호를 입력해주세요'); return; }

  userName = nameVal;
  userPw = pwVal;

  try { 
    localStorage.setItem(NAME_KEY, userName); 
    localStorage.setItem(PASSWORD_KEY, userPw); 
  } catch {}
  
  render();
};

window.changeName = () => {
  userName = '';
  userPw = '';
  try { 
    localStorage.removeItem(NAME_KEY); 
    localStorage.removeItem(PASSWORD_KEY); 
  } catch {}
  render();
};

window._downloadCsv = () => {
  let csvContent = "\uFEFF시간대,구분,이름,설정암호,신청시간\n";
  
  TIME_SLOTS.forEach(slot => {
    const { confirmed, waiting } = getSortedList(bookings[slot] || {});
    confirmed.forEach(p => {
      const timeStr = new Date(p.timestamp).toLocaleTimeString('ko-KR');
      csvContent += `${slot},확정,${p.name},${p.password || ''},${timeStr}\n`;
    });
    waiting.forEach((p, idx) => {
      const timeStr = new Date(p.timestamp).toLocaleTimeString('ko-KR');
      csvContent += `${slot},대기(순번${idx+1}),${p.name},${p.password || ''},${timeStr}\n`;
    });
  });

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `헌혈행사_최종예약명단_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

function isConfigEmpty(cfg) {
  return Object.values(cfg).some(v => v.includes('여기에_붙여넣기'));
}

function showConfigError() {
  document.getElementById('app').innerHTML = `
    <div class="error-box">
      ⚠️ Firebase 설정이 필요합니다.<br><br>
      아래 가이드에 따라 <code>index.html</code> 파일 안의<br>
      <strong>firebaseConfig</strong> 값을 채워주세요.<br>
    </div>`;
}

function init() {
  if (isConfigEmpty(firebaseConfig)) { showConfigError(); return; }
  try { 
    userName = localStorage.getItem(NAME_KEY) || ''; 
    userPw = localStorage.getItem(PASSWORD_KEY) || ''; 
  } catch {}

  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);

  const bookingsRef = ref(db, 'bookings');
  onValue(bookingsRef, (snapshot) => {
    const data = snapshot.val() || {};
    bookings = {};
    TIME_SLOTS.forEach(slot => { bookings[slot] = data[slot] || {}; });
    render();
  }, (error) => {
    document.getElementById('app').innerHTML = `
      <div class="error-box">Firebase 연결 오류: ${error.message}</div>`;
  });
}

init();
</script>
